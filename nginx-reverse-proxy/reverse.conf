events {
  worker_connections 1024;
}
http {
    server{
        listen 80;
        server_name kos-nextcloud.intern.tconet.de kos-portainer.intern.tconet.de kos-authelia.intern.tconet.de;
        return 301 https://$host$request_uri;
    }

    ## -- NEXTCLOUD --
    server{
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name kos-nextcloud.intern.tconet.de;

        client_max_body_size 128M;

        auth_request /authelia;
        include snippets/authelia.conf;


        ssl_certificate         /etc/nginx/certs/nextcloud.cer;
        ssl_certificate_key     /etc/nginx/certs/nextcloud.key;

        location / {
            proxy_pass http://nextcloud-nginx:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    ## -- PORTAINER --
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name kos-portainer.intern.tconet.de;

        ssl_certificate     /etc/nginx/certs/nextcloud.cer;
        ssl_certificate_key /etc/nginx/certs/nextcloud.key;

        location / {
            proxy_pass http://portainer:9000;  
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    ## -- AUTHELIA --
    server { 
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name kos-authelia.intern.tconet.de;

        access_log /var/log/nginx/authelia_access.log;
        error_log /var/log/nginx/authelia_error.log;

        ssl_certificate     /etc/nginx/certs/nextcloud.cer;
        ssl_certificate_key /etc/nginx/certs/nextcloud.key;

        location / {
            proxy_pass                              http://authelia:9091;
            proxy_set_header Host                   $host;
            proxy_set_header X-Original-URL         $scheme://$http_host$request_uri;
            proxy_set_header X-Forwarded-Proto      $scheme;
            proxy_set_header X-Forwarded-Host       $http_host;
            proxy_set_header X-Forwarded-URI        $request_uri;
            proxy_set_header X-Forwarded-Ssl on;
            proxy_set_header X-Forwarded-For        $remote_addr;
        }
    }
}

